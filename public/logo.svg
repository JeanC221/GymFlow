<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Dumbbell with arrow -->
  <g fill="#FFFFFF" stroke="none">
    <!-- Left outer plate -->
    <rect x="72" y="196" width="30" height="120" rx="10"/>
    <!-- Left inner plate -->
    <rect x="102" y="212" width="26" height="88" rx="8"/>
    <!-- Left small cap -->
    <rect x="56" y="230" width="16" height="52" rx="6"/>

    <!-- Right outer plate -->
    <rect x="374" y="196" width="30" height="120" rx="10"/>
    <!-- Right inner plate -->
    <rect x="348" y="212" width="26" height="88" rx="8"/>
    <!-- Right small cap -->
    <rect x="404" y="230" width="16" height="52" rx="6"/>

    <!-- Bar (lower half, behind arrow) -->
    <rect x="128" y="248" width="100" height="16" rx="4"/>
    <rect x="300" y="248" width="48" height="16" rx="4"/>
  </g>

  <!-- Arrow curving upward from bar center -->
  <g fill="#FFFFFF" stroke="none">
    <!-- Arrow body - curved path from left-center going up-right -->
    <path d="M 220 270 C 220 270 210 240 230 210 C 250 180 280 175 310 165 L 310 190 C 290 195 270 200 255 215 C 240 232 245 250 245 250 Z"/>
    <!-- Arrow head pointing up-right -->
    <polygon points="310,140 350,178 305,192"/>
  </g>
</svg>
