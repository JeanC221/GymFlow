<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Dumbbell -->
  <g fill="none" stroke="#FFFFFF" stroke-width="20" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left weight plates -->
    <rect x="108" y="218" width="28" height="76" rx="8" fill="#FFFFFF" stroke="none"/>
    <rect x="82" y="204" width="26" height="104" rx="8" fill="#FFFFFF" stroke="none"/>
    <!-- Right weight plates -->
    <rect x="376" y="218" width="28" height="76" rx="8" fill="#FFFFFF" stroke="none"/>
    <rect x="404" y="204" width="26" height="104" rx="8" fill="#FFFFFF" stroke="none"/>
    <!-- Bar -->
    <line x1="136" y1="256" x2="376" y2="256" stroke="#FFFFFF" stroke-width="16"/>
  </g>

  <!-- Trend line going up -->
  <polyline
    points="120,340 200,300 260,320 320,220 420,140"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="18"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Arrow tip -->
  <polyline
    points="380,145 420,140 415,180"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="18"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
